name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Syntax check
        run: python -m py_compile src/*.py dashboard/app.py scripts/backup_db.py

      - name: Smoke tests (지표 계산 / DB 업서트 멱등성)
        run: pytest -q tests/
