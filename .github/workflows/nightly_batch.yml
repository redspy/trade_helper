name: Nightly Stock Analysis Batch

on:
  schedule:
    # 매일 16:00 UTC = 01:00 KST (GitHub cron은 UTC 기준)
    - cron: "0 16 * * *"
  workflow_dispatch: {}   # 수동 실행 허용

concurrency:
  group: nightly-batch
  cancel-in-progress: false

jobs:
  analyze:
    # self-hosted 러너(서버)에서 실행 — 시크릿(.env)과 DB는 서버에 상주.
    # ⚠️ DB는 반드시 워크스페이스 밖에 두어야 함 (.env의 DATABASE_URL을
    #    절대경로로 지정) — checkout이 워크스페이스를 리셋하기 때문.
    runs-on: self-hosted
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v4

      - name: Copy server .env
        shell: powershell
        run: |
          $runnerRoot = (Resolve-Path "$env:GITHUB_WORKSPACE\..\..\..\").Path
          Copy-Item (Join-Path $runnerRoot ".env") (Join-Path $env:GITHUB_WORKSPACE ".env") -Force

      - name: Ensure dependencies
        shell: powershell
        run: |
          if (-not (Test-Path ".venv")) { python -m venv .venv }
          & ".\.venv\Scripts\python.exe" -m pip install -q -r requirements.txt

      - name: Run pipeline
        shell: powershell
        run: '& ".\.venv\Scripts\python.exe" -m src.main'

      - name: Backup database (SQLite, 7일 보관)
        shell: powershell
        run: '& ".\.venv\Scripts\python.exe" scripts/backup_db.py'

      - name: Notify failure via Telegram
        if: failure()
        shell: powershell
        run: |
          # 서버 .env의 TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID 사용 (없으면 스킵)
          $env:PYTHONIOENCODING = "utf-8"
          $envMap = @{}
          Get-Content ".env" | ForEach-Object {
            if ($_ -match "^\s*([A-Z_]+)\s*=\s*(.+)\s*$") { $envMap[$Matches[1]] = $Matches[2] }
          }
          $token = $envMap["TELEGRAM_BOT_TOKEN"]; $chat = $envMap["TELEGRAM_CHAT_ID"]
          if ($token -and $chat) {
            $msg = "trade_dash 야간 배치 실패 - Actions 로그를 확인하세요: $env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID"
            Invoke-RestMethod -Method Post -Uri "https://api.telegram.org/bot$token/sendMessage" `
              -Body @{ chat_id = $chat; text = $msg } | Out-Null
            Write-Host "[notify] Telegram 알림 전송"
          } else {
            Write-Host "[notify] TELEGRAM_* 미설정 - 알림 스킵"
          }
